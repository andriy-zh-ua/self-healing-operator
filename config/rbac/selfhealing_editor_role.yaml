# This rule is not used by the project self-healing-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the selfhealing.a2solutions.ca.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/managed-by: kustomize
  name: selfhealing-editor-role
rules:
- apiGroups:
  - selfhealing.a2solutions.ca
  resources:
  - selfhealings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - selfhealing.a2solutions.ca
  resources:
  - selfhealings/status
  verbs:
  - get
