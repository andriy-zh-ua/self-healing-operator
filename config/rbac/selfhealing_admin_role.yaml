# This rule is not used by the project self-healing-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over selfhealing.a2solutions.ca.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: self-healing-operator
    app.kubernetes.io/managed-by: kustomize
  name: selfhealing-admin-role
rules:
- apiGroups:
  - selfhealing.a2solutions.ca
  resources:
  - selfhealings
  verbs:
  - '*'
- apiGroups:
  - selfhealing.a2solutions.ca
  resources:
  - selfhealings/status
  verbs:
  - get
